name: Release PixeArt

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: PixeArt-macOS.zip

          - os: windows-latest
            artifact: PixeArt-Windows.zip

          - os: ubuntu-latest
            artifact: PixeArt-Linux.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS
        if: runner.os == 'macOS'
        run: |
          pyinstaller --windowed --name PixeArt --icon icon.icns main.py

      - name: Build Windows
        if: runner.os == 'Windows'
        run: |
          pyinstaller --windowed --name PixeArt main.py

      - name: Build Linux
        if: runner.os == 'Linux'
        run: |
          pyinstaller --windowed --name PixeArt main.py

      - name: Zip macOS App
        if: runner.os == 'macOS'
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent PixeArt.app PixeArt-macOS.zip

      - name: Zip Windows Build
        if: runner.os == 'Windows'
        run: |
          powershell Compress-Archive dist/PixeArt/* dist/PixeArt-Windows.zip

      - name: Zip Linux Build
        if: runner.os == 'Linux'
        run: |
          cd dist
          zip -r PixeArt-Linux.zip PixeArt

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip