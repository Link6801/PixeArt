name: Release PixeArt

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS
        if: runner.os == 'macOS'
        run: pyinstaller --windowed --name PixeArt --icon icon.icns main.py

      - name: Build Windows
        if: runner.os == 'Windows'
        run: pyinstaller --windowed --name PixeArt main.py

      - name: Build Linux
        if: runner.os == 'Linux'
        run: pyinstaller --windowed --name PixeArt main.py